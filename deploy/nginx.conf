# /etc/nginx/sites-available/neuro
# After certbot --nginx -d neurochat.space this file gets the 443 server block too.

server {
    listen 80;
    server_name neurochat.space www.neurochat.space;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect everything else to https (certbot will add this)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name neurochat.space www.neurochat.space;

    ssl_certificate     /etc/letsencrypt/live/neurochat.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neurochat.space/privkey.pem;

    # PWA + general site (built React SPA)
    root /opt/neuro/web/dist;
    index index.html;

    client_max_body_size 200m;

    # Static SPA, with SPA-fallback to index.html
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hashed asset cache
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Uploaded user content — served directly by nginx (avoid Node).
    location /uploads/ {
        alias /opt/neuro/server/data/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # API + Socket.io to Node
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7d;
    }
}
