# /etc/nginx/sites-available/neuro — HTTP-ONLY phase.
# Used by bootstrap.sh during the first run to satisfy the Let's Encrypt
# http-01 challenge. After the certificate is issued, bootstrap.sh swaps
# this file out for nginx.conf (HTTP + HTTPS).

server {
    listen 80;
    listen [::]:80;
    server_name neurochat.space www.neurochat.space;

    # Webroot for ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    # During the bootstrap phase the site already serves the SPA over plain HTTP
    # so you can verify the install before the cert is ready.
    root /opt/neuro/web/dist;
    index index.html;

    client_max_body_size 200m;

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /uploads/ {
        alias /opt/neuro/server/data/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7d;
    }
}
